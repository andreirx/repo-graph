# ── Operational dependency seam detector graph ────────────────────
#
# This file is the source of truth for env + fs seam detector
# coverage. The TypeScript loader (`loader.ts`) parses this file at
# module-load time, validates every declaration against the strict
# schema, and produces a `LoadedDetectorGraph` consumed by the
# generic walker.
#
# The future Rust daemon will load the same file with the same
# strictness rules and the same hook names. The hook registry on
# either runtime is the only language-specific surface; everything
# else is data.
#
# Schema:
#   [[detector]]
#   language    = "ts" | "py" | "rs" | "java" | "c"
#   family      = "env" | "fs"
#   pattern_id  = unique-within-(language, family) identifier
#   regex       = JavaScript-flavored regex (literal single-quoted)
#   flags       = optional, defaults to "g"
#   confidence  = 0.0 .. 1.0
#   hook        = optional named hook from the registry
#   single_match_per_line = optional, defaults false
#
#   env-only fields:
#     access_kind     = "required" | "optional" | "unknown"
#     access_pattern  = enum from EnvAccessPattern
#
#   fs-only fields:
#     base_kind             = enum from MutationKind
#     base_pattern          = enum from MutationPattern
#     two_ended             = optional, defaults false
#     position_dedup_group  = optional named overlap group
#
# Either a static field is declared OR a hook supplies it. The
# loader rejects any record where required fields are unreachable.
#
# Record order matters: the walker iterates records in declaration
# order per line, and env-family dedup is "first occurrence wins".
# Preserve the same order as the legacy detector code to keep
# byte-identical behavior.

# ══════════════════════════════════════════════════════════════════
# ENV — JS/TS family (covers .ts, .tsx, .js, .jsx)
# ══════════════════════════════════════════════════════════════════

[[detector]]
language       = "ts"
family         = "env"
pattern_id     = "process_env_dot"
regex          = 'process\.env\.([A-Z_][A-Z0-9_]*)'
confidence     = 0.95
access_pattern = "process_env_dot"
hook           = "infer_js_env_access_with_default"

[[detector]]
language       = "ts"
family         = "env"
pattern_id     = "process_env_bracket"
regex          = '''process\.env\[["']([A-Z_][A-Z0-9_]*)["']\]'''
confidence     = 0.95
access_pattern = "process_env_bracket"
hook           = "infer_js_env_access_with_default"

# Legacy used `line.match()` (no `g`), single match per line.
# `single_match_per_line = true` preserves that exactly.
[[detector]]
language              = "ts"
family                = "env"
pattern_id            = "process_env_destructure"
regex                 = '(?:const|let|var)\s*\{([^}]+)\}\s*=\s*process\.env'
confidence            = 0.90
access_pattern        = "process_env_destructure"
hook                  = "expand_js_env_destructure"
single_match_per_line = true

