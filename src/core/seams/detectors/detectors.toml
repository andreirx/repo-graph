# ══════════════════════════════════════════════════════════════════
# FS — Python
# ══════════════════════════════════════════════════════════════════

# open(path, "w") and open(path, "a") share one regex with mode in
# group 2. Walker default targetPath comes from group 1 (literal or
# null). Mode-based dispatch is via... wait, the legacy splits mode
# manually inside the loop. We need a hook here to dispatch.
#
# Actually the legacy's regex captures mode in group 2 and the
# emission selects kind+pattern based on group 2[0]. Since both kind
# AND pattern depend on mode, hook is required.
[[detector]]
language     = "py"
family       = "fs"
pattern_id   = "py_open_write_or_append"
regex        = '''\bopen\s*\(\s*(?:["']([^"']+)["']|[^,)]+)\s*,\s*["']([wa])[^"']*["']'''
confidence   = 0.85
hook         = "dispatch_python_open_mode"

[[detector]]
language     = "py"
family       = "fs"
pattern_id   = "py_remove_or_unlink_or_rmtree"
regex        = '''\b(os\.(?:remove|unlink)|shutil\.rmtree)\s*\(\s*(?:["']([^"']+)["']|[^)]+)\s*\)'''
confidence   = 0.90
base_kind    = "delete_path"
hook         = "dispatch_python_remove_call"

[[detector]]
language     = "py"
family       = "fs"
pattern_id   = "py_mkdir_or_makedirs"
regex        = '''\bos\.(mkdir|makedirs)\s*\(\s*(?:["']([^"']+)["']|[^)]+)'''
confidence   = 0.90
base_kind    = "create_dir"
hook         = "dispatch_python_mkdir_call"

[[detector]]
language     = "py"
family       = "fs"
pattern_id   = "py_pathlib_write"
regex        = '''Path\s*\(\s*["']([^"']+)["']\s*\)\.write_(?:text|bytes)'''
confidence   = 0.85
base_kind    = "write_file"
base_pattern = "py_pathlib_write"

[[detector]]
language     = "py"
family       = "fs"
pattern_id   = "py_pathlib_mkdir"
regex        = '''Path\s*\(\s*["']([^"']+)["']\s*\)\.mkdir'''
confidence   = 0.85
base_kind    = "create_dir"
base_pattern = "py_pathlib_mkdir"

# Legacy used `regex.test(line)` and emits one record per line.
# `single_match_per_line = true` preserves that exactly.
[[detector]]
language              = "py"
family                = "fs"
pattern_id            = "py_tempfile"
regex                 = '\btempfile\.(?:NamedTemporaryFile|mkstemp|TemporaryFile)'
confidence            = 0.90
base_kind             = "create_temp"
base_pattern          = "py_tempfile"
single_match_per_line = true

# ══════════════════════════════════════════════════════════════════
# FS — Rust
# ══════════════════════════════════════════════════════════════════
#
# Each Rust fs call type is expressed as TWO records: a literal
# variant and a catch-all variant. Both records share a named
# overlap group so the walker dedupes by (line, match.index)
# within the group, keeping the literal-capturing variant when
# both match the same call site. Distinct call sites still emit
# independently because dedup is position-keyed.

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_write_literal"
regex                = '(?:std::)?fs::write\s*\(\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "write_file"
base_pattern         = "rust_fs_write"
position_dedup_group = "rust_fs_write_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_write_catchall"
regex                = '(?:std::)?fs::write\s*\('
confidence           = 0.90
base_kind            = "write_file"
base_pattern         = "rust_fs_write"
position_dedup_group = "rust_fs_write_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_remove_file_literal"
regex                = '(?:std::)?fs::remove_file\s*\(\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "delete_path"
base_pattern         = "rust_fs_remove_file"
position_dedup_group = "rust_fs_remove_file_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_remove_file_catchall"
regex                = '(?:std::)?fs::remove_file\s*\('
confidence           = 0.90
base_kind            = "delete_path"
base_pattern         = "rust_fs_remove_file"
position_dedup_group = "rust_fs_remove_file_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_remove_dir_all_literal"
regex                = '(?:std::)?fs::remove_dir_all\s*\(\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "delete_path"
base_pattern         = "rust_fs_remove_dir_all"
position_dedup_group = "rust_fs_remove_dir_all_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_remove_dir_all_catchall"
regex                = '(?:std::)?fs::remove_dir_all\s*\('
confidence           = 0.90
base_kind            = "delete_path"
base_pattern         = "rust_fs_remove_dir_all"
position_dedup_group = "rust_fs_remove_dir_all_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_create_dir_literal"
regex                = '(?:std::)?fs::create_dir(?:_all)?\s*\(\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "create_dir"
base_pattern         = "rust_fs_create_dir"
position_dedup_group = "rust_fs_create_dir_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_create_dir_catchall"
regex                = '(?:std::)?fs::create_dir(?:_all)?\s*\('
confidence           = 0.90
base_kind            = "create_dir"
base_pattern         = "rust_fs_create_dir"
position_dedup_group = "rust_fs_create_dir_callsite"

# Rust rename has TWO patterns: a 2-arg literal variant (twoEnded
# captures both src and dst) and a 1-arg literal variant (only
# src captured, dst null). Same dedup group so the 2-arg version
# wins when both match the same call site.
[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_rename_two_args"
regex                = '(?:std::)?fs::rename\s*\(\s*"([^"]+)"\s*,\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "rename_path"
base_pattern         = "rust_fs_rename"
two_ended            = true
position_dedup_group = "rust_fs_rename_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_rename_one_arg"
regex                = '(?:std::)?fs::rename\s*\(\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "rename_path"
base_pattern         = "rust_fs_rename"
position_dedup_group = "rust_fs_rename_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_copy_two_args"
regex                = '(?:std::)?fs::copy\s*\(\s*"([^"]+)"\s*,\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "copy_path"
base_pattern         = "rust_fs_copy"
two_ended            = true
position_dedup_group = "rust_fs_copy_callsite"

[[detector]]
language             = "rs"
family               = "fs"
pattern_id           = "rust_fs_copy_one_arg"
regex                = '(?:std::)?fs::copy\s*\(\s*"([^"]+)"'
confidence           = 0.90
base_kind            = "copy_path"
base_pattern         = "rust_fs_copy"
position_dedup_group = "rust_fs_copy_callsite"

# ══════════════════════════════════════════════════════════════════
# FS — Java
# ══════════════════════════════════════════════════════════════════
#
# Each Java fs detector emits ONE record per line in the legacy
# code (via `regex.test()` then a separate `line.match()` for the
# literal). `single_match_per_line = true` preserves that exactly.
# The hook does the line-wide literal extraction.

[[detector]]
language              = "java"
family                = "fs"
pattern_id            = "java_files_write"
regex                 = '\bFiles\.write(?:String)?\s*\('
confidence            = 0.85
base_kind             = "write_file"
base_pattern          = "java_files_write"
hook                  = "unwrap_java_files_write_literal"
single_match_per_line = true

[[detector]]
language              = "java"
family                = "fs"
pattern_id            = "java_files_delete"
regex                 = '\bFiles\.delete\s*\('
confidence            = 0.85
base_kind             = "delete_path"
base_pattern          = "java_files_delete"
hook                  = "unwrap_java_files_delete_literal"
single_match_per_line = true

[[detector]]
language              = "java"
family                = "fs"
pattern_id            = "java_files_create_directory"
regex                 = '\bFiles\.createDirector(?:y|ies)\s*\('
confidence            = 0.85
base_kind             = "create_dir"
base_pattern          = "java_files_create_directory"
hook                  = "unwrap_java_files_create_directory_literal"
single_match_per_line = true

# new FileOutputStream: literal case has confidence 0.85 (the
# static), dynamic case has confidence 0.80 (overridden by hook).
[[detector]]
language              = "java"
family                = "fs"
pattern_id            = "java_file_output_stream"
regex                 = '\bnew\s+FileOutputStream\s*\('
confidence            = 0.85
base_kind             = "write_file"
base_pattern          = "java_file_output_stream"
hook                  = "unwrap_java_file_output_stream_literal"
single_match_per_line = true

