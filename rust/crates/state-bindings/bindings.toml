# State-boundary binding table — SB-3 FS-only matrix.
#
# Scope: Node.js filesystem stdlib APIs under four canonical
# module specifiers. Every entry is `basis = "stdlib_api"` and
# `driver = "node-fs"`.
#
# Why four modules: Node.js resolves `"fs"` and `"node:"-prefixed
# `"node:fs"` to the SAME built-in. Both specifiers are idiomatic
# in modern TS/JS; `"node:"` is the explicit-protocol form. Same
# applies to `"fs/promises"` and `"node:fs/promises"`. Slice-1
# matching is exact per contract §6.1, so we ship exact rows for
# every canonical specifier. Module-specifier normalization
# (`node:fs` → `fs`) is a separate substrate decision and is NOT
# part of this slice (see SB-3 lock 3-impl.4).
#
# Explicitly deferred for SB-3 (enforced by SB-3.5 + SB-3.7):
#   - SDK clients (`@aws-sdk/client-s3`, `pg`, `mysql2`, `redis`,
#     etc.): need object-property extraction and/or constructor
#     tracking, neither of which SB-3 ships.
#   - Metadata-only FS ops (`readdir`, `stat`, `access`,
#     `realpath`, etc.): out of scope for slice 1; file content
#     touchpoints only.
#   - `open` / `openSync` / `fs.promises.open`: direction is
#     flag-dependent (r/w/a); without flag parsing, a single
#     direction would be misleading. Deferred.

# ── fs ─────────────────────────────────────────────────────────

[[binding]]
language      = "typescript"
module        = "fs"
symbol_path   = "readFile"
resource_kind = "fs"
driver        = "node-fs"
direction     = "read"
basis         = "stdlib_api"

