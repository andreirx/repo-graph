language      = "typescript"
module        = "fs"
symbol_path   = "readFileSync"
resource_kind = "fs"
driver        = "node-fs"
direction     = "read"
basis         = "stdlib_api"

[[binding]]
language      = "typescript"
module        = "fs"
symbol_path   = "writeFile"
resource_kind = "fs"
driver        = "node-fs"
direction     = "write"
basis         = "stdlib_api"

